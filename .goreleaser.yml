version: 2

builds:
  - main: .
    binary: nepenthe
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ryanwersal/nepenthe/cmd.version={{.Version}}
      - -X github.com/ryanwersal/nepenthe/cmd.commit={{.ShortCommit}}
      - -X github.com/ryanwersal/nepenthe/cmd.date={{.Date}}

archives:
  - formats: [tar.gz]
    files:
      - LICENSE

homebrew_casks:
  - name: nepenthe
    binaries:
      - nepenthe
    homepage: https://github.com/ryanwersal/nepenthe
    description: Selective forgetfulness for macOS Time Machine
    license: GPL-3.0
    # Strip Gatekeeper quarantine from the unsigned binary so it runs on
    # first launch without "cannot be opened because the developer cannot
    # be verified".
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/nepenthe"]
          end
    repository:
      owner: ryanwersal
      name: homebrew-tools
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
